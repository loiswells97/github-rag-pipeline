services:
  db:
    image: pgvector/pgvector:pg16
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vector_db"]
      interval: 2s
      timeout: 5s
      retries: 15
    restart: unless-stopped
  init:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: vector_db
      POSTGRES_USER: postgres
      DOCUMENTS_DIR: /app/documents
      PYTHONUNBUFFERED: "1"
    env_file:
      - .env
    volumes:
      - .:/app
    command: >
      sh -c "uv run python db_setup.py && uv run python ingest.py"
    restart: "no"
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: vector_db
      POSTGRES_USER: postgres
    env_file:
      - .env
    volumes:
      - .:/app
    restart: unless-stopped
  smee:
    image: deltaprojects/smee-client
    platform: linux/amd64
    command: -u $SMEE_WEBHOOK_URL -t http://api:8000/github_webhooks
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
volumes:
  postgres_data:
